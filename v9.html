#0f766e'],QHED:['きれいに整えすぎ型','考えはある。でも出口がAIのきれいな言葉に寄りやすい。','自分の言葉のクセ','最後の表現をAIに寄せすぎると、あなたの体温が薄くなります。','AI文に、あえて雑な自分の一文を戻す。','文章が整いすぎる','🧼','#38bdf8','#7c3aed'],QHJR:['AIを疑える相棒型','問いも仮説もある。AIを判断前のシミュレーターにできる。','判断前の安心感','AIに支配されにくいタイプです。ただ、確認が増えると決断の速度が落ちます。','AIに聞く回数を2回までにする。','確認しすぎ注意','🛡️','#0f766e','#2563eb'],QHJD:['AI占い信者型','仮説はあるのに、最後の一押しをAIに寄せがち。','最後に選ぶ力','考えられます。でも最後の「これでいい」をAIに言ってほしくなりやすい。','AIの結論後、自分が一番嫌じゃない方を書く。','最後をAIに聞きがち','🔮','#7c3aed','#db2777'],QMER:['質問待ち迷子型','AIに聞き出されると進む。問いを作る前で止まりやすい。','問いを立てる力','答えが出ないのではなく、最初の問いが作れず止まりやすいタイプです。','最初に「私に3つ質問して」と頼む。','聞く前に止まる','❓','#60a5fa','#f97316'],QMED:['受け身編集型','素材はある。でも言語化をAIに預けがち。','言葉にする力','中に材料はあります。ただ、最初の言葉をAIに預けるほど、自分の感覚が薄くなります。','AIに渡す前に、単語を3つだけ自分で置く。','言語化を預けがち','📝','#22c55e','#a855f7'],QMJR:['不安確認型','決めたいのに、何度もAIに確認してしまう。','自分を信じる力','AIを使っているというより、不安を鎮めるためにAIへ戻っている可能性があります。','相談前に「これ以上聞かない条件」を決める。','安心するまで聞く','💦','#f59e0b','#06b6d4'],QMJD:['丸投げ預言者型','AIが正解をくれる前提になりやすい。脳溶け注意タイプ。','考え始める力','AIがないと答えが出ないのではなく、考え始める前にAIを呼ぶ癖が強くなっています。','AIに聞く前に、自分の仮説を1行だけ書く。','考える前にAIを開く','🔮','#4c1d95','#f59e0b'],AHER:['自走ライター型','自分で考え、AIで整える。かなりバランス型。','整える作業','AIに思考を奪われにくいタイプです。AIを清書係として使えています。','たまにAIなしで最後まで書く日を作る。','かなり健全','✒️','#16a34a','#0ea5e9'],AHED:['AI文体感染型','考えはある。でも文章がAIっぽくなりやすい。','自分の文体','中身は人間っぽいのに、出口でAIの整いすぎた言葉に変わりやすいです。','自分の口癖・違和感・本音を一文だけ足す。','AIっぽい文章になりがち','🤖','#64748b','#a855f7'],AHJR:['判断補助型','AIを比較材料として使える健全タイプ。','反対意見を出す力','AIに決めさせるのではなく、判断材料を増やす道具として使えています。','賛成案だけでなく反対案も出させる。','使い方はうまい','⚖️','#14b8a6','#2563eb'],AHJD:['最終決定外注型','自分の考えはある。でも最後の決定をAIに渡しがち。','選んだ実感','考える力より「自分で選んだ」という感覚をAIに預けやすいタイプです。','選ばなかった方を捨てる理由を自分で書く。','最後だけ外注しがち','✅','#f97316','#dc2626'],AMER:['素材投下職人型','とりあえず入れる。使えるけど、目的がぼやけやすい。','目的設定','素材をAIに渡せます。ただ、何を得たいかが曖昧なままだと結果も薄くなります。','AIに渡す前に「欲しい結果」を1行で書く。','素材は出せる','📦','#ca8a04','#22c55e'],AMED:['量産コンテンツ型','早い。でも薄くなりやすい。AI臭が出やすい。','深掘りする力','AIで量を出せます。ただ、速さに寄りすぎると人間の引っかかりが消えます。','投稿前に「誰のどんな欲に刺さる？」を足す。','速いけど薄くなりがち','📄','#ef4444','#8b5cf6'],AMJR:['迷走相談型','AIの答えは疑う。でも決めきれず相談が増える。','決
