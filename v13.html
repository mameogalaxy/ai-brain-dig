<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI脳16タイプ診断</title><style>body{margin:0;background:#fff9ef;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif}.loading{min-height:100vh;display:grid;place-items:center;color:#174ea6;font-weight:900}</style></head><body><div class="loading">AI脳16タイプ診断を読み込み中...</div><script>

</script></body></html>
