<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>AI脳16タイプ診断</title><meta name="description" content="AIに聞く前、自分の考えは残ってる？AI脳16タイプ診断。"><style>:root{--bg:#f8f1e7;--ink:#171412;--sub:#6b625a;--line:#e7d9c8;--dark:#111827;--soft:#f1e8dc}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,rgba(255,79,123,.13),transparent 27%),radial-gradient(circle at 100% 0,rgba(89,74,255,.13),transparent 30%),linear-gradient(#fffaf4,var(--bg));color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;line-height:1.62}.wrap{max-width:980px;margin:auto;padding:18px 14px 56px}.panel{background:rgba(255,253,248,.97);border:1px solid var(--line);border-radius:28px;box-shadow:0 18px 42px rgba(24,20,18,.08);padding:22px 18px;margin-top:14px}.hide{display:none!important}.badge,.time{display:inline-block;border-radius:999px;padding:8px 12px;font-weight:850;font-size:12px}.badge{background:var(--dark);color:#fff}.time{background:#ffe5ec;color:#9f1239;margin-left:6px}h1{font-size:clamp(40px,10.5vw,76px);line-height:1.01;letter-spacing:-.085em;margin:14px 0 12px}h2{font-size:26px;letter-spacing:-.045em;margin:0 0 10px}p{margin:0 0 10px}.lead{font-size:18px;color:var(--sub)}.box{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:13px 14px;margin:15px 0;font-weight:800}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button{appearance:none;border:0;border-radius:999px;min-height:48px;padding:13px 18px;background:var(--dark);color:#fff;font:850 15px/1 -apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}button.sub{background:#fff;color:var(--ink);border:1px solid var(--line)}button:disabled{opacity:.45}.hero{display:grid;grid-template-columns:1.08fr .92fr;gap:16px}.preview{background:linear-gradient(180deg,#151a28,#1f2540);color:#fff;border-radius:26px;padding:18px}.pick4{display:grid;gap:9px;margin-top:12px}.pick,.cardType{display:grid;grid-template-columns:76px 1fr;gap:10px;align-items:center}.pick{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:19px;padding:9px}.pick span{font-size:12px;color:#d7dcf1}.small{font-size:13px;color:var(--sub)}.meta{font-size:13px;color:var(--sub);font-weight:850}.barbox{height:10px;background:var(--soft);border-radius:999px;overflow:hidden;margin:9px 0 14px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--dark),#6d4aff)}.guide{background:var(--dark);color:#e7ebff;border-radius:18px;padding:12px 14px;margin-bottom:12px;font-size:14px}.q{font-size:24px;line-height:1.35;font-weight:950;letter-spacing:-.045em;margin:8px 0 14px}.choices{display:grid;gap:10px}.choice,.judge{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px;cursor:pointer}.choice.on,.judge.on{border-color:#8368ff;background:#f3efff}.choice b,.judge b{display:block;font-size:16px}.choice span,.judge span{display:block;color:var(--sub);font-size:14px;margin-top:3px}.sample{background:#fff6d8;border:1px solid #ead28b;border-radius:18px;padding:14px;margin-bottom:12px}.sample b{display:block;color:#7c4a03;margin-bottom:5px}textarea{width:100%;min-height:140px;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fffdf8;color:var(--ink);font:inherit;resize:vertical}.nav{display:flex;gap:10px;margin-top:16px}.nav button{flex:1}.resultHero{background:linear-gradient(135deg,#111827,#202b4a 58%,#6d4aff 145%);color:#fff;border-radius:26px;padding:18px;display:grid;grid-template-columns:150px 1fr;gap:14px;align-items:center}.code{font-size:42px;font-weight:950;line-height:1}.name{font-size:31px;font-weight:950;letter-spacing:-.055em}.catch{color:#d7dcf1}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.axis{background:var(--soft);border:1px solid var(--line);border-radius:16px;text-align:center;padding:12px}.axis b{font-size:18px}.blocks{display:grid;gap:12px;margin-top:14px}.block{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.find{background:#fff6d8;border-color:#ead28b}.find p{font-size:22px;font-weight:950;letter-spacing:-.04em}.share{min-height:130px}.allTypes{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.cardType{background:#fffdf8;border:1px solid var(--line);border-radius:20px;padding:10px}.cardType span{font-size:12px;color:var(--sub)}@media(max-width:760px){.hero,.resultHero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.allTypes{grid-template-columns:1fr}.panel{border-radius:22px;padding:20px 15px}.name{font-size:26px}.code{font-size:38px}}</style></head><body><main class="wrap"><section id="home" class="panel"><div class="hero"><div><span class="badge">AI脳16タイプ診断</span><span class="time">約2分</span><h1>AIに聞く前、<br>自分の考え<br>残ってる？</h1><p class="lead">答えは早い。文章も整う。でも、考える前にAIを開く癖がついてきた気がする。そんなAIとの距離感を16タイプで見ます。</p><div class="box">最初の4問でタイプが決まります。後半は自分のAI癖を確認するための質問です。</div><div class="btns"><button onclick="App.start()">診断をはじめる</button><button class="sub" onclick="App.types()">16タイプを見る</button></div><p class="small">18問 / 結果はタイプ別キャラつき</p></div><div class="preview"><h2 style="color:#fff">結果タイプの一部</h2><p style="color:#d7dcf1">選び方によって、全16タイプが出ます。</p><div class="pick4" id="pick4"></div></div></div></section><section id="quiz" class="panel hide"><div class="meta" id="meta"></div><div class="barbox"><div class="bar" id="bar"></div></div><div class="guide" id="guide"></div><div class="q" id="qt"></div><div id="area"></div><div class="nav"><button class="sub" onclick="App.back()">戻る</button><button id="next" onclick="App.next()" disabled>次へ</button></div></section><section id="result" class="panel hide"><div class="resultHero"><div id="icon"></div><div><div class="code" id="code"></div><div class="name" id="name"></div><div class="catch" id="catch"></div></div></div><div class="grid"><div class="axis"><b id="a1"></b><br><span class="small">問い方</span></div><div class="axis"><b id="a2"></b><br><span class="small">仮説</span></div><div class="axis"><b id="a3"></b><br><span class="small">役割</span></div><div class="axis"><b id="a4"></b><br><span class="small">受け取り</span></div></div><div class="blocks"><div class="block find"><h2>AIに任せがちな思考</h2><p id="finding"></p></div><div class="block"><h2>あなたのAI脳ログ</h2><p id="insight"></p></div><div class="block"><h2>1分リセット</h2><p id="action"></p></div><div class="block"><h2>共有テキスト</h2><textarea id="share" class="share" readonly></textarea><div class="btns"><button onclick="App.x()">Xで共有</button><button class="sub" onclick="App.copy()">コピー</button><button class="sub" onclick="App.start()">もう一度</button><button class="sub" onclick="App.types()">16タイプ</button></div></div></div></section><section id="types" class="panel hide"><h2>16タイプ一覧</h2><div id="all" class="allTypes"></div><div class="btns"><button class="sub" onclick="App.home()">トップへ戻る</button></div></section></main><script>const $=id=>document.getElementById(id);let i=0,ans=[],free='',ai=false,judge='';const axis={Q:'質問型',A:'回答待ち',H:'仮説あり',M:'丸投げ',E:'編集型',J:'判断型',R:'疑う',D:'受け取る'};const qs=[['Q/A','AIに相談するとき、最初に近いのは？',['AIに質問してもらいながら整理したい','何を聞けばいいかも一緒に作りたい','Q'],['すぐ答えや案を出してほしい','とにかく結果がほしい','A']],['H/M','AIに聞く前、自分の仮説はある？',['ざっくりでも自分の考えを書いてから聞く','AIは比較や補助に使う','H'],['何も浮かばないから、そのまま投げる','まずAIに出してもらう','M']],['E/J','AIに一番やってほしい役割は？',['自分の考えを整える編集者','言い換え、整理、磨き上げ','E'],['迷ったときに決めてくれる判断者','選択、結論、方向づけ','J']],['R/D','AIの答えを見たあとの自分は？',['どこが違うか、足りないかを探す','AIの答えを疑って使う','R'],['かなりそのまま受け取る','AIが言うならそうかもと思う','D']],{free:1,g:'短くても大丈夫です。思いついた範囲で書いてください。',q:'最近、AIを使っていて「自分で考える力が弱くなったかも」と感じた場面を書いてください。'}, {judge:1,g:'直感に近い方を選んでください。',q:'どちらの文章の方が、AIっぽく見えますか？'},['確認質問','この文章はAIで作られたものだと思いますか？',['AIで作られたと思う','整いすぎた感じがある','R'],['人間が書いたと思う','自然な感想として受け取った','D'],'AIがない生活は考えられない。文章も相談もアイデア出しもAIが支えてくれる。私にとってAIは、毎日の思考を広げてくれる相棒です。'],['確認質問','「AIがない生活は考えられない」に近い？',['近い。困ったらまずAIを開く','AIがないと考え始めにくい','M'],['便利だけど、なくても自分で考える余地はある','AIは道具で、主導権は残している','H']],['確認質問','AIで人生が変わったと感じるのはどっち？',['自分で試す回数が増えた','AIが行動の起点になった','Q'],['AIがないと動き出しにくくなった','AIがないと不安になる場面が増えた','M']],['確認質問','「何を聞けばいいかわからない」ときは？',['AIに「私に質問して」と頼む','問いを作るところから任せる','Q'],['とりあえず「教えて」と聞く','答えから入る','A']],['確認質問','投稿や文章を作るときは？',['最初の一文や骨子は自分で出す','AIは後から使う','H'],['ゼロからAIに出してもらう','白紙がしんどい','M']],['確認質問','AIの出力に期待するものは？',['自分らしさを残したまま良くすること','編集・補強が目的','E'],['これでいける、という判断をくれること','背中を押してほしい','J']],['確認質問','AIに褒められたら？',['いや、本当にそうか？と一度疑う','甘い評価を警戒する','R'],['少し安心して、その方向に寄せる','肯定されると進みやすい','D']],['確認質問','AIで伸びたと感じる使い方は？',['自分でも気づいてない問いを掘れたとき','考えが深くなる','Q'],['欲しい答えが早く出たとき','作業が進む','A']],['確認質問','AIなしで10分考えるのは？',['できる。むしろ先に少し考えたい','AI前の余白がある','H'],['正直すぐAIに聞きたくなる','考え始めが重い','M']],['確認質問','AIの提案が3つ出たら？',['自分の言葉や目的に合わせて混ぜる','素材として使う','E'],['一番よさそうなものを選んでもらいたい','決める負担を減らしたい','J']],['確認質問','AIが断言してきたら？',['根拠や別案を聞き返す','そのままでは使わない','R'],['かなり信じる。迷いが減るなら助かる','強い答えがほしい','D']],['確認質問','1日でAIを使う回数は？',['少ないが、使う前に考える時間はある','回数より主導権を残している','H'],['多い。考える前にAIを開くことが増えた','回数より起動タイミングが問題','M']]];const types={QHER:['壁打ち司令官型','AIを参謀にしつつ、主導権は自分に残せるタイプ。','考える前の主導権','AIに答えをもらうより、思考を深める相手として使えています。','最後に必ず「今日やる1つ」を決める。','考えるだけで終わりがち','🧭','#2563eb','#0f766e'],QHED:['きれいに整えすぎ型','考えはある。でも出口がAIのきれいな言葉に寄りやすい。','自分の言葉のクセ','最後の表現をAIに寄せすぎると、あなたの体温が薄くなります。','AI文に、あえて雑な自分の一文を戻す。','文章が整いすぎる','🧼','#38bdf8','#7c3aed'],QHJR:['AIを疑える相棒型','問いも仮説もある。AIを判断前のシミュレーターにできる。','判断前の安心感','AIに支配されにくいタイプです。ただ、確認が増えると決断の速度が落ちます。','AIに聞く回数を2回までにする。','確認しすぎ注意','🛡️','#0f766e','#2563eb'],QHJD:['AI占い信者型','仮説はあるのに、最後の一押しをAIに寄せがち。','最後に選ぶ力','考えられます。でも最後の「これでいい」をAIに言ってほしくなりやすい。','AIの結論後、自分が一番嫌じゃない方を書く。','最後をAIに聞きがち','🔮','#7c3aed','#db2777'],QMER:['質問待ち迷子型','AIに聞き出されると進む。問いを作る前で止まりやすい。','問いを立てる力','答えが出ないのではなく、最初の問いが作れず止まりやすいタイプです。','最初に「私に3つ質問して」と頼む。','聞く前に止まる','❓','#60a5fa','#f97316'],QMED:['受け身編集型','素材はある。でも言語化をAIに預けがち。','言葉にする力','中に材料はあります。ただ、最初の言葉をAIに預けるほど、自分の感覚が薄くなります。','AIに渡す前に、単語を3つだけ自分で置く。','言語化を預けがち','📝','#22c55e','#a855f7'],QMJR:['不安確認型','決めたいのに、何度もAIに確認してしまう。','自分を信じる力','AIを使っているというより、不安を鎮めるためにAIへ戻っている可能性があります。','相談前に「これ以上聞かない条件」を決める。','安心するまで聞く','💦','#f59e0b','#06b6d4'],QMJD:['丸投げ預言者型','AIが正解をくれる前提になりやすい。脳溶け注意タイプ。','考え始める力','AIがないと答えが出ないのではなく、考え始める前にAIを呼ぶ癖が強くなっています。','AIに聞く前に、自分の仮説を1行だけ書く。','考える前にAIを開く','🔮','#4c1d95','#f59e0b'],AHER:['自走ライター型','自分で考え、AIで整える。かなりバランス型。','整える作業','AIに思考を奪われにくいタイプです。AIを清書係として使えています。','たまにAIなしで最後まで書く日を作る。','かなり健全','✒️','#16a34a','#0ea5e9'],AHED:['AI文体感染型','考えはある。でも文章がAIっぽくなりやすい。','自分の文体','中身は人間っぽいのに、出口でAIの整いすぎた言葉に変わりやすいです。','自分の口癖・違和感・本音を一文だけ足す。','AIっぽい文章になりがち','🤖','#64748b','#a855f7'],AHJR:['判断補助型','AIを比較材料として使える健全タイプ。','反対意見を出す力','AIに決めさせるのではなく、判断材料を増やす道具として使えています。','賛成案だけでなく反対案も出させる。','使い方はうまい','⚖️','#14b8a6','#2563eb'],AHJD:['最終決定外注型','自分の考えはある。でも最後の決定をAIに渡しがち。','選んだ実感','考える力より「自分で選んだ」という感覚をAIに預けやすいタイプです。','選ばなかった方を捨てる理由を自分で書く。','最後だけ外注しがち','✅','#f97316','#dc2626'],AMER:['素材投下職人型','とりあえず入れる。使えるけど、目的がぼやけやすい。','目的設定','素材をAIに渡せます。ただ、何を得たいかが曖昧なままだと結果も薄くなります。','AIに渡す前に「欲しい結果」を1行で書く。','素材は出せる','📦','#ca8a04','#22c55e'],AMED:['量産コンテンツ型','早い。でも薄くなりやすい。AI臭が出やすい。','深掘りする力','AIで量を出せます。ただ、速さに寄りすぎると人間の引っかかりが消えます。','投稿前に「誰のどんな欲に刺さる？」を足す。','速いけど薄くなりがち','📄','#ef4444','#8b5cf6'],AMJR:['迷走相談型','AIの答えは疑う。でも決めきれず相談が増える。','決断の締め','AIを信じすぎてはいません。ただ、疑い続けることで前に進みにくくなるタイプです。','3案出たら4案目を求めず、一番マシを選ぶ。','相談が終わらない','🌀','#0891b2','#f97316'],AMJD:['完全外注型','考える、書く、決めるを全部AIに預けがち。','思考全体の主導権','便利に使えている一方で、自分の判断や言葉が後ろに下がりやすい状態です。','AI前に「自分ならこうする」を1行書く。','全部AIに寄りがち','🔌','#111827','#ef4444']};function show(id){['home','quiz','result','types'].forEach(x=>$(x).classList.add('hide'));$(id).classList.remove('hide')}function ch(k,big){let t=types[k],w=big?138:64,h=big?138:64,eye=k[3]=='R'?'M38 66l10-8m-10 0l10 8M82 66l-10-8m10 0l-10 8':'M42 62a6 6 0 100 .1M78 62a6 6 0 100 .1',mouth=k[1]=='M'?'M45 90q18-11 36 0':'M45 86q18 13 36 0';return `<svg width="${w}" height="${h}" viewBox="0 0 130 130"><defs><linearGradient id="g${k}${w}" x1="0" y1="0" x2="1" y2="1"><stop stop-color="${t[7]}"/><stop offset="1" stop-color="${t[8]}"/></linearGradient></defs><rect x="6" y="6" width="118" height="118" rx="32" fill="url(#g${k}${w})"/><circle cx="65" cy="68" r="39" fill="#fff6d8"/><path d="${eye}" stroke="#111827" stroke-width="5" stroke-linecap="round"/><path d="${mouth}" stroke="#111827" stroke-width="5" stroke-linecap="round" fill="none"/><circle cx="96" cy="30" r="24" fill="rgba(255,255,255,.24)"/><text x="96" y="40" text-anchor="middle" font-size="25">${t[6]}</text><text x="65" y="120" text-anchor="middle" fill="#fff" font-size="16" font-weight="900">${k}</text></svg>`}function fillTop(){['QMJD','AHED','AMJD','QHER'].forEach((k,n)=>$('pick4').innerHTML+=`<div class="pick">${ch(k,0)}<div><b>${types[k][0]}</b><span>${types[k][5]}</span></div></div>`);$('all').innerHTML=Object.keys(types).map(k=>`<div class="cardType">${ch(k,0)}<div><b>${types[k][0]}</b><span>${types[k][5]}</span></div></div>`).join('')}function render(){let q=qs[i];$('meta').textContent=`Q${i+1} / ${qs.length}`;$('bar').style.width=(i/qs.length*100)+'%';$('guide').textContent=q.g||q[0];$('qt').textContent=q.q||q[1];$('next').textContent=i==qs.length-1?'結果を見る':'次へ';$('next').disabled=true;let h='';if(q.free){h=`<textarea id="free" placeholder="短くても大丈夫です"></textarea><div class="btns"><button onclick="App.ai()">AIに任せる</button><button class="sub" onclick="App.clear()">自分で書き直す</button></div>`;$('area').innerHTML=h;$('free').value=free;$('free').oninput=()=>{free=$('free').value.trim();$('next').disabled=free.length<2};$('next').disabled=free.length<2;return}if(q.judge){h=`<div class="choices"><div id="ja" class="judge" onclick="App.j('ai')"><b>A</b><span>AIを活用することで、作業効率の向上や品質の安定化が期待できます。目的に応じて適切に使用することが重要です。</span></div><div id="jh" class="judge" onclick="App.j('human')"><b>B</b><span>AI便利なんだけど、先に答え見ちゃうと、自分の雑な考えを出す前に終わる感じがある。</span></div></div>`;$('area').innerHTML=h;if(judge=='ai')$('ja').classList.add('on');if(judge=='human')$('jh').classList.add('on');$('next').disabled=!judge;return}if(q[4])h+=`<div class="sample"><b>判別する文章</b><p>${q[4]}</p></div>`;h+='<div cla
