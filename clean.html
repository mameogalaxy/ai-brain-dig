<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>AI脳発掘診断</title><meta name="description" content="AIとの距離感を見直す18問の診断です。"><style>:root{--bg:#f7f1e8;--paper:#fffdf8;--ink:#171412;--sub:#6d655d;--line:#e7d9c8;--dark:#111827;--vio:#6d4aff;--soft:#f1e8dc;--gold:#d8a742}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 0 0,rgba(109,74,255,.12),transparent 30%),linear-gradient(#fffaf3,var(--bg));color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;line-height:1.65}.wrap{max-width:900px;margin:auto;padding:18px 14px 56px}.panel{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:28px;box-shadow:0 18px 42px rgba(24,20,18,.08);padding:22px 18px;margin-top:14px}.hide{display:none!important}.badge{display:inline-block;background:var(--dark);color:#fff;border-radius:999px;padding:8px 12px;font-weight:850;font-size:12px}h1{font-size:clamp(36px,9vw,66px);line-height:1.03;letter-spacing:-.075em;margin:14px 0 12px}h2{font-size:26px;letter-spacing:-.04em;margin:0 0 10px}p{margin:0 0 10px}.lead{font-size:18px;color:var(--sub)}.box{background:var(--soft);border:1px solid var(--line);border-radius:18px;padding:13px 14px;margin:15px 0;font-weight:750}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}button{appearance:none;border:0;border-radius:999px;min-height:48px;padding:13px 18px;background:var(--dark);color:#fff;font:850 15px/1 -apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif}button.sub{background:#fff;color:var(--ink);border:1px solid var(--line)}button:disabled{opacity:.45}.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:16px}.card{background:linear-gradient(180deg,#151a28,#1f2540);color:#fff;border-radius:26px;padding:18px;min-height:240px;display:flex;flex-direction:column;justify-content:space-between}.pills{display:flex;gap:8px;flex-wrap:wrap}.pill{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800}.meta{font-size:13px;color:var(--sub);font-weight:850}.barbox{height:10px;background:var(--soft);border-radius:999px;overflow:hidden;margin:9px 0 14px}.bar{height:100%;width:0;background:linear-gradient(90deg,var(--dark),var(--vio))}.guide{background:var(--dark);color:#e7ebff;border-radius:18px;padding:12px 14px;margin-bottom:12px;font-size:14px}.q{font-size:24px;line-height:1.35;font-weight:950;letter-spacing:-.045em;margin:8px 0 14px}.choices{display:grid;gap:10px}.choice,.judge{border:1px solid var(--line);background:#fff;border-radius:18px;padding:14px;cursor:pointer}.choice.on,.judge.on{border-color:#8368ff;background:#f3efff}.choice b,.judge b{display:block;font-size:16px}.choice span,.judge span{display:block;color:var(--sub);font-size:14px;margin-top:3px}.sample{background:#fff6d8;border:1px solid #ead28b;border-radius:18px;padding:14px;margin-bottom:12px}.sample b{display:block;color:#7c4a03;margin-bottom:5px}textarea{width:100%;min-height:140px;border:1px solid var(--line);border-radius:16px;padding:14px;background:#fffdf8;color:var(--ink);font:inherit;resize:vertical}.nav{display:flex;gap:10px;margin-top:16px}.nav button{flex:1}.resultHero{background:linear-gradient(135deg,#111827,#1e2b4a 60%,#6d4aff 140%);color:#fff;border-radius:26px;padding:18px;display:grid;grid-template-columns:100px 1fr;gap:14px;align-items:center}.code{font-size:50px;font-weight:950;line-height:1}.name{font-size:28px;font-weight:950;letter-spacing:-.04em}.catch{color:#d7dcf1}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}.axis{background:var(--soft);border:1px solid var(--line);border-radius:16px;text-align:center;padding:12px}.axis b{font-size:18px}.blocks{display:grid;gap:12px;margin-top:14px}.block{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px}.find{background:#fff6d8;border-color:#ead28b}.find p{font-size:22px;font-weight:950;letter-spacing:-.04em}.small{font-size:13px;color:var(--sub)}.share{min-height:130px}@media(max-width:760px){.hero{grid-template-columns:1fr}.resultHero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.panel{border-radius:22px;padding:20px 15px}.code{font-size:42px}.name{font-size:24px}}</style></head><body><main class="wrap"><section id="home" class="panel"><div class="hero"><div><span class="badge">AI脳発掘診断</span><h1>あなたの思考、<br>どこまでAIに<br>預けてる？</h1><p class="lead">AIを使ってるのに、なんか自分で考え始める力が弱くなった気がする。そんな違和感を18問で見ていきます。</p><div class="box">深く考えすぎず、ふだんの自分に近い方を選んでください。</div><div class="btns"><button onclick="App.start()">診断をはじめる</button></div><p class="small">約2分 / 18問 / 結果は共有できます</p></div><div class="card"><div><h2 style="color:#fff">思考発掘員 ノウホリ</h2><p style="color:#d7dcf1">あなたのAIとの距離感を、少しだけのぞきます。</p></div><div class="pills"><span class="pill">考え始める</span><span class="pill">言葉にする</span><span class="pill">疑う</span><span class="pill">決める</span></div></div></div></section><section id="quiz" class="panel hide"><div class="meta" id="meta"></div><div class="barbox"><div class="bar" id="bar"></div></div><div class="guide" id="guide"></div><div class="q" id="qt"></div><div id="area"></div><div class="nav"><button class="sub" onclick="App.back()">戻る</button><button id="next" onclick="App.next()" disabled>次へ</button></div></section><section id="result" class="panel hide"><div class="resultHero"><div id="icon"></div><div><div class="code" id="code"></div><div class="name" id="name"></div><div class="catch" id="catch"></div></div></div><div class="grid"><div class="axis"><b id="a1"></b><br><span class="small">問い方</span></div><div class="axis"><b id="a2"></b><br><span class="small">仮説</span></div><div class="axis"><b id="a3"></b><br><span class="small">役割</span></div><div class="axis"><b id="a4"></b><br><span class="small">受け取り</span></div></div><div class="blocks"><div class="block find"><h2>発掘された思考</h2><p id="finding"></p></div><div class="block"><h2>脳内ログ</h2><p id="insight"></p></div><div class="block"><h2>途中回答の見立て</h2><p id="mid"></p></div><div class="block"><h2>回復アクション</h2><p id="action"></p></div><div class="block"><h2>共有テキスト</h2><textarea id="share" class="share" readonly></textarea><div class="btns"><button onclick="App.x()">Xで共有</button><button class="sub" onclick="App.copy()">コピー</button><button class="sub" onclick="App.start()">もう一度</button></div></div></div></section></main><script>const $=id=>document.getElementById(id);let i=0,ans=[],free='',ai=false,judge='';const axis={Q:'質問型',A:'回答待ち',H:'仮説あり',M:'丸投げ',E:'編集型',J:'判断型',R:'疑う',D:'受け取る'};const qs=[['普段に近い方を選んでください。','AIに相談するとき、最初に近いのは？',['AIに質問してもらいながら整理したい','何を聞けばいいかも一緒に作りたい','Q'],['すぐ答えや案を出してほしい','とにかく結果がほしい','A']],['普段に近い方を選んでください。','AIに聞く前、自分の仮説はある？',['ざっくりでも自分の考えを書いてから聞く','AIは比較や補助に使う','H'],['何も浮かばないから、そのまま投げる','まずAIに出してもらう','M']],['普段に近い方を選んでください。','AIに一番やってほしい役割は？',['自分の考えを整える編集者','言い換え、整理、磨き上げ','E'],['迷ったときに決めてくれる判断者','選択、結論、方向づけ','J']],['普段に近い方を選んでください。','AIの答えを見たあとの自分は？',['どこが違うか、足りないかを探す','AIの答えを疑って使う','R'],['かなりそのまま受け取る','AIが言うならそうかもと思う','D']],{free:1,g:'短くても大丈夫です。思いついた範囲で書いてください。',q:'最近、AIを使っていて「自分で考える力が弱くなったかも」と感じた場面を書いてください。'}, {judge:1,g:'直感に近い方を選んでください。',q:'どちらの文章の方が、AIっぽく見えますか？'},['文章を読んで、直感に近い方を選んでください。','この文章はAIで作られたものだと思いますか？',['AIで作られたと思う','整いすぎた感じがある','R'],['人間が書いたと思う','自然な感想として受け取った','D'],'AIがない生活は考えられない。文章も相談もアイデア出しもAIが支えてくれる。私にとってAIは、毎日の思考を広げてくれる相棒です。'],['普段に近い方を選んでください。','「AIがない生活は考えられない」に近い？',['近い。困ったらまずAIを開く','AIがないと考え始めにくい','M'],['便利だけど、なくても自分で考える余地はある','AIは道具で、主導権は残している','H']],['普段に近い方を選んでください。','AIで人生が変わったと感じるのはどっち？',['自分で試す回数が増えた','AIが行動の起点になった','Q'],['AIがないと動き出しにくくなった','AIがないと不安になる場面が増えた','M']],['普段に近い方を選んでください。','「何を聞けばいいかわからない」ときは？',['AIに「私に質問して」と頼む','問いを作るところから任せる','Q'],['とりあえず「教えて」と聞く','答えから入る','A']],['普段に近い方を選んでください。','投稿や文章を作るときは？',['最初の一文や骨子は自分で出す','AIは後から使う','H'],['ゼロからAIに出してもらう','白紙がしんどい','M']],['普段に近い方を選んでください。','AIの出力に期待するものは？',['自分らしさを残したまま良くすること','編集・補強が目的','E'],['これでいける、という判断をくれること','背中を押してほしい','J']],['普段に近い方を選んでください。','AIに褒められたら？',['いや、本当にそうか？と一度疑う','甘い評価を警戒する','R'],['少し安心して、その方向に寄せる','肯定されると進みやすい','D']],['普段に近い方を選んでください。','AIで伸びたと感じる使い方は？',['自分でも気づいてない問いを掘れたとき','考えが深くなる','Q'],['欲しい答えが早く出たとき','作業が進む','A']],['普段に近い方を選んでください。','AIなしで10分考えるのは？',['できる。むしろ先に少し考えたい','AI前の余白がある','H'],['正直すぐAIに聞きたくなる','考え始めが重い','M']],['普段に近い方を選んでください。','AIの提案が3つ出たら？',['自分の言葉や目的に合わせて混ぜる','素材として使う','E'],['一番よさそうなものを選んでもらいたい','決める負担を減らしたい','J']],['普段に近い方を選んでください。','AIが断言してきたら？',['根拠や別案を聞き返す','そのままでは使わない','R'],['かなり信じる。迷いが減るなら助かる','強い答えがほしい','D']],['普段に近い方を選んでください。','1日でAIを使う回数は？',['少ないが、使う前に考える時間はある','回数より主導権を残している','H'],['多い。考える前にAIを開くことが増えた','回数より起動タイミングが問題','M']]];const types={QHER:['壁打ち司令官型','AIを参謀にしつつ、主導権は自分に残せるタイプ。','考える前の主導権','AIに答えをもらうより、思考を深める相手として使えています。','最後に必ず「今日やる1つ」を決めると、考えるだけで終わりにくくなります。'],QHED:['きれいに整えすぎ型','考えはある。でも出口がAIのきれいな言葉に寄りやすい。','自分の言葉のクセ','最後の表現をAIに寄せすぎると、あなたの体温が薄くなります。','AIで整えたあと、あえて一文だけ雑な自分の言葉に戻してください。'],QHJR:['AIを疑える相棒型','問いも仮説もある。AIを判断前のシミュレーターにできる。','判断前の安心感','AIに支配されにくいタイプです。ただ、確認が増えると決断の速度が落ちます。','AIに聞く回数を2回までにして、最後は自分の基準で決めてください。'],QHJD:['AI占い信者型','仮説はあるのに、最後の一押しをAIに寄せがち。','最後に選ぶ力','考えられます。でも最後の「これでいい」をAIに言ってほしくなりやすい。','AIの結論を見たあとに「でも自分はどれが一番嫌じゃないか」を書いてください。'],QMER:['質問待ち迷子型','AIに聞き出されると進む。問いを作る前で止まりやすい。','問いを立てる力','答えが出ないのではなく、最初の問いが作れず止まりやすいタイプです。','最初に「私に3つ質問して」とAIに頼むと動き出しやすいです。'],QMED:['受け身編集型','素材はある。でも言語化をAIに預けがち。','言葉にする力','中に材料はあります。ただ、最初の言葉をAIに預けるほど、自分の感覚が薄くなります。','AIに渡す前に、箇条書きで3つだけ自分の言葉を書いてください。'],QMJR:['不安確認型','決めたいのに、何度もAIに確認してしまう。','自分を信じる力','AIを使っているというより、不安を鎮めるためにAIへ戻っている可能性があります。','AIに相談したあと「これ以上聞かない条件」を1つ決めてください。'],QMJD:['丸投げ預言者型','AIが正解をくれる前提になりやすい。脳溶け注意タイプ。','考え始める力','AIがないと答えが出ないのではなく、考え始める前にAIを呼ぶ癖が強くなっています。','AIに聞く前に、自分の仮説を1行だけ書いてください。'],AHER:['自走ライター型','自分で考え、AIで整える。かなりバランス型。','整える作業','AIに思考を奪われにくいタイプです。AIを清書係として使えています。','たまにAIなしで最後まで書く日を作るとさらに戻ります。'],AHED:['AI文体感染型','考えはある。でも文章がAIっぽくなりやすい。','自分の文体','中身は人間っぽいのに、出口でAIの整いすぎた言葉に変わりやすいです。','AI文の最後に、自分の口癖・違和感・本音を一文だけ足してください。'],AHJR:['判断補助型','AIを比較材料として使える健全タイプ。','反対意見を出す力','AIに決めさせるのではなく、判断材料を増やす道具として使えています。','AIに賛成案だけでなく、反対案も必ず出させるとさらに強いです。'],AHJD:['最終決定外注型','自分の考えはある。でも最後の決定をAIに渡しがち。','選んだ実感','考える力より「自分で選んだ」という感覚をAIに預けやすいタイプです。','AIのおすすめを見たあとに、選ばなかった方を捨てる理由を自分で書いてください。'],AMER:['素材投下職人型','とりあえず入れる。使えるけど、目的がぼやけやすい。','目的設定','素材をAIに渡せます。ただ、何を得たいかが曖昧なままだと結果も薄くなります。','AIに渡す前に「欲しい結果は何か」を1行で書いてください。'],AMED:['量産コンテンツ型','早い。でも薄くなりやすい。AI臭が出やすい。','深掘りする力','AIで量を出せます。ただ、速さに寄りすぎると人間の引っかかりが消えます。','投稿前に「これは誰のどんな欲に刺さる？」を必ず1つ足してください。'],AMJR:['迷走相談型','AIの答えは疑う。でも決めきれず相談が増える。','決断の締め','AIを信じすぎてはいません。ただ、疑い続けることで前に進みにくくなるタイプです。','AIに3案出させたら、4案目を求めず、一番マシな案を選んでください。'],AMJD:['完全外注型','考える、書く、決めるを全部AIに預けがち。','思考全体の主導権','便利に使えている一方で、自分の判断や言葉が後ろに下がりやすい状態です。','AIに聞く前に「自分ならこうする」を1行。AIの後に「でも自分はこうする」を1行書いてください。']};function show(id){['home','quiz','result'].forEach(x=>$(x).classList.add('hide'));$(id).classList.remove('hide')}function icon(code){let c={Q:'#3b82f6',A:'#ef4444',H:'#10b981',M:'#f59e0b',E:'#8b5cf6',J:'#f97316',R:'#14b8a6',D:'#ec4899'};return `<svg width="92" height="92" viewBox="0 0 96 96"><rect x="4" y="4" width="88" height="88" rx="24" fill="${c[code[0]]}"/><circle cx="72" cy="24" r="18" fill="${c[code[2]]}" opacity=".9"/><text x="48" y="57" text-anchor="middle" fill="#fff" font-size="24" font-weight="900">${code}</text></svg>`}function render(){let q=qs[i];$('meta').textContent=`Q${i+1} / ${qs.length}`;$('bar').style.width=(i/qs.length*100)+'%';$('guide').textContent=q.g||q[0];$('qt').textContent=q.q||q[1];$('next').textContent=i==qs.length-1?'結果を見る':'次へ';$('next').disabled=true;let h='';if(q.free){h=`<textarea id="free" placeholder="短くても大丈夫です"></textarea><div class="btns"><button onclick="App.ai()">AIに任せる</button><button class="sub" onclick="App.clear()">自分で書き直す</button></div>`;$('area').innerHTML=h;$('free').value=free;$('free').oninput=()=>{free=$('free').value.trim();$('next').disabled=free.length<2};$('next').disabled=free.length<2;return}if(q.judge){h=`<div class="choices"><div id="ja" class="judge" onclick="App.j('ai')"><b>A</b><span>AIを活用することで、作業効率の向上や品質の安定化が期待できます。目的に応じて適切に使用することが重要です。</span></div><div id="jh" class="judge" onclick="App.j('human')"><b>B</b><span>AI便利なんだけど、先に答え見ちゃうと、自分の雑な考えを出す前に終わる感じがある。</span></div></div>`;$('area').innerHTML=h;if(judge=='ai')$('ja').classList.add('on');if(judge=='human')$('jh').classList.add('on');$('next').disabled=!judge;return}if(q[4])h+=`<div class="sample"><b>判別する文章</b><p>${q[4]}</p></div>`;h+='<div class="choices">';[q[2],q[3]].forEach((c,n)=>h+=`<div class="choice ${ans[i]===n?'on':''}" onclick="App.sel(${n})"><b>${c[0]}</b><span>${c[1]}</span></div>`);h+='</div>';$('area').innerHTML=h;$('next').disabled=ans[i]===undefined}function score(){let s={Q:0,A:0,H:0,M:0,E:0,J:0,R:0,D:0};ans.forEach((v,k)=>{let q=qs[k];if(Array.isArray(q)&&v!==undefined)s[q[v+2][2]]++});if(ai){s.M++;s.D++}else if(free)s.H++;if(judge=='ai')s.R++;if(judge=='human')s.D++;return(s.Q>=s.A?'Q':'A')+(s.H>=s.M?'H':'M')+(s.E>=s.J?'E':'J')+(s.R>=s.D?'R':'D')}function result(){let code=score(),t=types[code];$('icon').innerHTML=icon(code);$('code').textContent=code;$('name').textContent=t[0];$('catch').textContent=t[1];$('a1').textContent=axis[code[0]];$('a2').textContent=axis[code[1]];$('a3').textContent=axis[code[2]];$('a4').textContent=axis[code[3]];$('finding').textContent=`あなたがAIに預けていたのは「${t[2]}」です。`;$('insight').textContent=t[3];$('mid').textContent=ai?'途中でAIに任せたあなたは、答えだけでなく「言葉にする前段階」もAIに預けやすい傾向が少し見えます。':judge=='human'?'整った文章を自然に受け取りやすい傾向が少し見えます。きれいな言葉ほど、誰の体験が入っているかを見ると感覚が戻ります。':'自分の違和感や直感はまだ残っています。AIに聞く前の一文を置けると、主導権が戻りやすいです。';$('action').textContent=t[4];$('share').value=`AI脳発掘診断の結果：${code} ${t[0]}\n\n発掘された思考：${t[2]}\n\n${t[1]}\n\n#AI脳発掘診断`;history.replaceState({},'',`?type=${code}`);show('result')}window.App={start(){i=0;ans=[];free='';ai=false;judge='';show('quiz');render()},sel(n){ans[i]=n;render()},ai(){let ex=['迷ったときに、自分で決めるよりAIに決めてもらいたくなる。あとで自分で選んだ感じが残らない。','文章を書こうとした瞬間、最初の一文からAIに任せたくなる。整うけど、自分の言葉が出る前に答えを見にいっている感じがする。','AIの答えがきれいすぎて、自分の荒い考えを出すのが面倒になった。'];free=ex[Math.floor(Math.random()*ex.length)];ai=true;$('free').value=free;$('next').disabled=false},clear(){free='';ai=false;$('free').value='';$('next').disabled=true;$('free').focus()},j(v){judge=v;render()},next(){let q=qs[i];if(q.free&&free.length<2)return;if(q.judge&&!judge)return;if(Array.isArray(q)&&ans[i]===undefined)return;if(i<qs.length-1){i++;render()}else result()},back(){if(i>0){i--;render()}else show('home')},copy(){navigator.clipboard?navigator.clipboard.writeText($('share').value):0},x(){open('https://twitter.com/intent/tweet?text='+encodeURIComponent($('share').value)+'&url='+encodeURIComponent(location.href),'_blank')}};let p=new URLSearchParams(location.search),tc=p.get('type');if(tc&&types[tc]){show('result');let t=types[tc];$('icon').innerHTML=icon(tc);$('code').textContent=tc;$('name').textContent=t[0];$('catch').textContent=t[1];$('a1').textContent=axis[tc[0]];$('a2').textContent=axis[tc[1]];$('a3').textContent=axis[tc[2]];$('a4').textContent=axis[tc[3]];$('finding').textContent=`あなたがAIに預けていたのは「${t[2]}」です。`;$('insight').textContent=t[3];$('mid').textContent='共有された診断結果です。';$('action').textContent=t[4];$('share').value=`AI脳発掘診断の結果：${tc} ${t[0]}\n\n発掘された思考：${t[2]}\n\n${t[1]}\n\n#AI脳発掘診断`}</script></body></html>
